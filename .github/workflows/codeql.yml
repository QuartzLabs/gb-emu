name: CodeQL

on:
  push:
    branches: [main, dev]
    paths:
      - "src/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "cmake/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main, dev]
    paths:
      - "src/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "cmake/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [cpp]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup SDL
        id: sdl
        uses: libsdl-org/setup-sdl@main
        with:
          version: 2-latest
          install-linux-dependencies: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ steps.sdl.outputs.prefix }}

      - name: Build
        run: cmake --build build --config Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4